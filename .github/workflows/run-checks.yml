name: Run checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Pre-merge checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: DeLaGuardo/setup-clojure@13
        with:
          bb: 1.12.218
          clj-kondo: 2026.05.25
          cljfmt: 0.16.4
      - name: Lint
        run: clj-kondo --lint src views test
      - name: Check formatting
        run: cljfmt check src views test
      - name: Run tests
        run: bb test
