name: Run checks

on:
  pull_request:
  push:
    branches: [main]

jobs:
  checks:
    name: Pre-merge checks
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: DeLaGuardo/setup-clojure@13
        with:
          bb: 1.12.218
          clj-kondo: 2026.05.25
          cljfmt: 0.16.4
      - name: Run tests
        run: bb test
      - name: Install shell linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck=0.9.0-1 shfmt=3.8.0-1
      - name: Lint and check formatting
        uses: j178/prek-action@v2
        with:
          prek-version: 0.4.8
