repos:
  - repo: local
    hooks:
      - id: shellcheck
        name: shellcheck
        entry: shellcheck
        language: system
        files: (\.sh$|^deploy/freebsd/trmnl_hsl$)
      - id: shfmt
        name: shfmt
        entry: shfmt
        args: ["--indent", "2", "--case-indent", "--space-redirects", "--diff"]
        language: system
        files: (\.sh$|^deploy/freebsd/trmnl_hsl$)
